framework:
  - name: tensorflow                              # possible values are tensorflow, mxnet and pytorch
    inputs: input
    outputs: MobilenetV2/Predictions/Reshape_1

calibration:                                         
  - iterations: 2,7
    algorithm:
      - activation: minmax
        weight: minmax

quantization: 
    weight:
      - granularity: per_channel

tuning:
  - strategy: mse
    metric:  
      - topk: 1
    accuracy_criterion:
      - relative: 0.02                             # the tuning target of accuracy loss percentage: 1%
    timeout: 3600                                      # tuning timeout (seconds)
    random_seed: 9527                               # random seed                       

